name: formfix
description: AI-powered real-time form correction and body analysis
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  google_mlkit_commons: ^0.11.1
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_pose_detection: ^0.14.1
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  fl_chart: ^0.68.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

dependency_overrides:
  google_mlkit_commons: 0.11.1

flutter:
  uses-material-design: true
  assets:
    - assets/
