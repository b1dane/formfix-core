name: Build FormFix APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: false
      - name: Create fresh Flutter project
        run: flutter create --org com.formfix --project-name formfix fresh_project
      - name: Fix minSdk in build.gradle
        run: |
          cat > /tmp/fix_sdk.py << 'EOF'
          import re
          c = open('fresh_project/android/app/build.gradle').read()
          c = re.sub(r'minSdk\s+\S+', 'minSdk 24', c)
          c = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 24', c)
          open('fresh_project/android/app/build.gradle', 'w').write(c)
          print('minSdk fixed')
          EOF
          python3 /tmp/fix_sdk.py
      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml
          cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
      - name: Install dependencies
        working-directory: fresh_project
        run: flutter pub get
      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
