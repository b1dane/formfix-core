name: Build FormFix APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Flutter 3.41.9
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.41.9 --depth 1 /opt/flutter
          /opt/flutter/bin/flutter precache --android
          /opt/flutter/bin/flutter --version
      - name: Create fresh Flutter project
        run: /opt/flutter/bin/flutter create --org com.formfix --project-name formfix fresh_project
      - name: Fix minSdk 24
        run: |
          ls fresh_project/android/app/
          python3 -c "
import re,os
for f in ['fresh_project/android/app/build.gradle','fresh_project/android/app/build.gradle.kts']:
    if os.path.exists(f):
        c=open(f).read()
        print('Found:',f)
        print('Before:',c[:200])
        c=re.sub('minSdk[= ]+[0-9]+','minSdk = 24',c)
        open(f,'w').write(c)
        print('Fixed')
        break
" 
      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml
          cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
      - name: Install dependencies
        working-directory: fresh_project
        run: /opt/flutter/bin/flutter pub get
      - name: Build APK
        working-directory: fresh_project
        run: /opt/flutter/bin/flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
