name: Build FormFix APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
          cache: false
      - name: Create fresh Flutter project
        run: flutter create --org com.formfix --project-name formfix fresh_project
      - name: Overwrite build.gradle with known-good config
        run: |
          cat > fresh_project/android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.formfix.formfix"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              defaultConfig {
                  applicationId "com.formfix.formfix"
                  minSdk 21
                  targetSdk flutter.targetSdkVersion
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          GRADLE
      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml
          cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
      - name: Install dependencies
        working-directory: fresh_project
        run: flutter pub get
      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
