name: Build FormFix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: Create fresh Flutter project
        run: flutter create --org com.formfix --project-name formfix fresh_project

      - name: Fix minSdkVersion
        run: |
          python3 << 'EOF'
          import os
          import re

          possible = [
              'fresh_project/android/app/build.gradle',
              'fresh_project/android/app/build.gradle.kts'
          ]

          gradle_path = None

          for p in possible:
              if os.path.exists(p):
                  gradle_path = p
                  break

          if not gradle_path:
              raise Exception('No Gradle build file found')

          with open(gradle_path, 'r') as f:
              c = f.read()

          c = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', c)
          c = re.sub(r'minSdk\s+\d+', 'minSdk 24', c)
          c = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 24', c)

          with open(gradle_path, 'w') as f:
              f.write(c)

          print('Updated:', gradle_path)
          EOF

      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml

          if [ -f source/android/app/src/main/AndroidManifest.xml ]; then
            cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
          fi

      - name: Install dependencies
        working-directory: fresh_project
        run: flutter pub get

      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
