name: Formfix Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Fix Flutter + Android dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Force Gradle namespace compatibility patch
        run: |
          find ~/.pub-cache -type f -path "*google_mlkit*/android/build.gradle" | while read file; do
            if ! grep -q "namespace" "$file"; then
              sed -i '/android {/a \    namespace "com.mlkit.generated"' "$file"
            fi
          done

      - name: Fix Android toolchain compatibility
        run: |
          cd android || true

          # Force modern AndroidX + Gradle compatibility
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-apk
          path: build/app/outputs/flutter-apk/app-release.apk