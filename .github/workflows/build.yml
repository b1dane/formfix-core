name: Build FormFix APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
          cache: false
      - name: Create fresh Flutter project
        run: flutter create --org com.formfix --project-name formfix fresh_project
      - name: Fix minSdkVersion in build.gradle
        run: python3 -c "
          import re
          f = open('fresh_project/android/app/build.gradle', 'r')
          c = f.read()
          f.close()
          print('BEFORE:', c)
          c2 = re.sub(r'minSdk\s+\S+', 'minSdk 24', c)
          c3 = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 24', c2)
          f = open('fresh_project/android/app/build.gradle', 'w')
          f.write(c3)
          f.close()
          print('AFTER:', c3)
          "
      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml
          cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
      - name: Install dependencies
        working-directory: fresh_project
        run: flutter pub get
      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
