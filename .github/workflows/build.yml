name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get



      - name: Verify dependencies
        run: flutter pub get

      - name: Patch ML Kit namespace
        run: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/google_mlkit_commons-0.3.0/android"
          TARGET_FILE="$PLUGIN_DIR/build.gradle"

          if [ -f "$TARGET_FILE" ] && ! grep -q "namespace" "$TARGET_FILE"; then
            echo "Patching google_mlkit_commons namespace..."
            sed -i '/android {/a\    namespace "com.google.mlkit.commons"' "$TARGET_FILE"
          else
            echo "Namespace already present or plugin not found."
          fi

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30