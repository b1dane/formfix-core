name: Build FormFix APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    env:
      FLUTTER_HOME: /opt/flutter
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Flutter 3.41.9
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.41.9 --depth 1 /opt/flutter
          export PATH="/opt/flutter/bin:$PATH"
          flutter precache --android
          flutter --version
          echo "/opt/flutter/bin" >> $GITHUB_PATH
      - name: Create fresh Flutter project
        run: |
          export PATH="/opt/flutter/bin:$PATH"
          flutter create --org com.formfix --project-name formfix fresh_project
      - name: Fix minSdk 24
        run: |
          python3 << 'EOF'
import re
path = 'fresh_project/android/app/build.gradle'
c = open(path).read()
print('BEFORE minSdk:', re.findall(r'minSdk\S*\s+\S+', c))
c = re.sub(r'minSdk\s+\S+', 'minSdk 24', c)
c = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 24', c)
open(path, 'w').write(c)
print('AFTER minSdk:', re.findall(r'minSdk\S*\s+\S+', c))
EOF
      - name: Copy source
        run: |
          cp -r source/lib/* fresh_project/lib/
          cp source/pubspec.yaml fresh_project/pubspec.yaml
          cp source/android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
      - name: Install dependencies
        working-directory: fresh_project
        run: flutter pub get
      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
