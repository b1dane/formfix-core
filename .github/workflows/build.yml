name: Build FormFix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Create fresh Flutter project
        run: flutter create --org com.formfix --project-name formfix fresh_project

      - name: Fix minSdkVersion
        run: python3 .github/scripts/fix-min-sdk.py fresh_project

      - name: Copy source files
        run: |
          set -e
          cp -r lib/* fresh_project/lib/
          cp pubspec.yaml fresh_project/pubspec.yaml
          
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml fresh_project/android/app/src/main/AndroidManifest.xml
          fi

      - name: Force namespace for old plugins
        run: python3 .github/scripts/inject-namespace.py fresh_project/android/build.gradle

      - name: Build APK
        working-directory: fresh_project
        run: flutter build apk --release

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
