name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🔒 CRITICAL FIX: force modern ML Kit versions (prevents 0.3.0 crash)
      - name: Override broken ML Kit dependency
        run: |
          echo "Forcing compatible ML Kit versions"
          flutter pub add google_mlkit_commons:^0.11.1
          flutter pub add google_mlkit_pose_detection:^0.14.1

      - name: Verify dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: formfix-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30