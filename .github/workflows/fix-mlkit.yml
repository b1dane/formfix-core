name: Fix MLKit Namespace

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: |
          echo "Flutter version:"
          flutter --version
          echo "Flutter doctor:"
          flutter doctor -v

      - name: Get initial dependencies
        run: |
          echo "Running initial flutter pub get..."
          flutter pub get

      - name: Patch ML Kit Commons namespace
        run: |
          echo "Patching google_mlkit_commons namespace..."
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/google_mlkit_commons-0.11.1/android"
          TARGET_FILE="$PLUGIN_DIR/build.gradle"
          
          if [ -f "$TARGET_FILE" ]; then
            echo "Found google_mlkit_commons build.gradle at: $TARGET_FILE"
            if ! grep -q "namespace" "$TARGET_FILE"; then
              echo "Adding namespace to google_mlkit_commons build.gradle..."
              sed -i '/android {/a\    namespace "com.google.mlkit.commons"' "$TARGET_FILE"
              echo "Patch applied successfully."
            else
              echo "Namespace already present in google_mlkit_commons."
            fi
          else
            echo "WARNING: google_mlkit_commons build.gradle not found at expected location."
            echo "Searching for it in pub-cache..."
            FOUND_FILE=$(find "$HOME/.pub-cache" -name "build.gradle" -path "*/google_mlkit_commons-*/android/build.gradle" | head -n 1)
            if [ -n "$FOUND_FILE" ]; then
              echo "Found at: $FOUND_FILE"
              if ! grep -q "namespace" "$FOUND_FILE"; then
                echo "Adding namespace..."
                sed -i '/android {/a\    namespace "com.google.mlkit.commons"' "$FOUND_FILE"
                echo "Patch applied successfully."
              else
                echo "Namespace already present."
              fi
            else
              echo "ERROR: Could not find google_mlkit_commons build.gradle to patch."
              exit 1
            fi
          fi

      - name: Get dependencies after patch
        run: |
          echo "Running flutter pub get after patching..."
          flutter pub get

      - name: Verify dependencies resolved correctly
        run: |
          echo "Checking resolved versions..."
          flutter pub deps | grep -A2 -B2 "google_mlkit_commons\|google_mlkit_pose_detection"

      - name: Analyze project
        run: |
          echo "Running flutter analyze..."
          flutter analyze

      - name: Test project
        run: |
          echo "Running flutter test..."
          flutter test

      - name: Build debug APK
        run: |
          echo "Building debug APK..."
          flutter build apk --debug

      - name: Build release APK
        run: |
          echo "Building release APK..."
          flutter build apk --release

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-release/app-release.apk